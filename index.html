<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>PK | EA - WPR Auto Settings Calculator</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WPR AutoCalc">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 600px; }
    .brand-logo { max-height: 80px; width: auto; margin-bottom: 10px; }
    .header h1 { color: #ff9800; margin: 0 0 5px 0; font-size: 26px; }
    .header p { margin: 0; color: #aaa; font-size: 14px;}
    
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    .input-panel {
      background-color: #1e1e1e;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #333;
      flex: 1;
      min-width: 300px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
    }
    .input-panel h3 { color: #ff9800; margin-top: 0; text-align: center; border-bottom: 1px dashed #444; padding-bottom: 10px;}
    
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 14px; color: #ccc; margin-bottom: 5px; font-weight: bold;}
    .label-desc { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 18px;
      border: 2px solid #444;
      border-radius: 6px;
      background-color: #2a2a2a;
      color: #fff;
      text-align: center;
      transition: 0.3s;
    }
    input[type="number"]:focus { outline: none; border-color: #ff9800; }
    
    .input-optional { border-color: #ff9800 !important; background-color: #2a2015 !important; }
    .input-optional:focus { border-color: #ffb74d !important; }

    .btn-calc {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background-color: #ff9800;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      text-transform: uppercase;
      margin-top: 10px;
      box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
    }
    .btn-calc:hover { background-color: #e68a00; transform: translateY(-2px); }

    .output-panel {
      background-color: #1e1e1e;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #ff9800;
      flex: 1;
      min-width: 300px;
      box-shadow: 0 8px 16px rgba(255, 152, 0, 0.15);
      position: relative;
    }
    .output-panel h3 { color: #fff; margin-top: 0; text-align: center; background-color: #ff9800; padding: 10px; border-radius: 6px; color: #000;}
    
    .setting-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }
    .setting-box {
      background-color: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      border-left: 4px solid #ff9800;
    }
    .setting-box.full { grid-column: span 2; border-left: none; border-top: 4px solid #f44336; }
    
    .setting-box h4 { margin: 0 0 5px 0; color: #aaa; font-size: 12px; text-transform: uppercase;}
    .setting-box .val { font-size: 24px; font-weight: bold; color: #fff; }
    .val-lot { color: #00d2ff !important; }
    .val-tp { color: #4caf50 !important; }
    .val-sl { color: #f44336 !important; }
    .val-steps { color: #00d2ff !important; }
    .val-loss { color: #f44336 !important; }
    .target-risk { font-size: 12px; color: #888; margin-top: 5px; }

    /* ตาราง */
    .table-container {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #333;
      width: 100%;
      max-width: 900px;
      margin-top: 30px;
      overflow-x: auto;
    }
    .table-container h3 { color: #ff9800; text-align: center; margin-top: 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: center; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #333; }
    th { background-color: #2a2a2a; color: #ff9800; }
    tr:hover { background-color: #252525; }
    .profit-range { font-weight: bold; }
    
    tfoot tr {
      background-color: #2a2a2a;
      border-top: 2px solid #ff9800;
      font-weight: bold;
    }
    tfoot td { font-size: 16px; }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://cdn.jsdelivr.net/gh/patkorn/piclogo/PK_EA.png" alt="PK | EA System Logo" class="brand-logo" onerror="this.style.display='none'">
    <h1>WPR EA : Smart Auto-Settings</h1>
    <p>คำนวณค่า Parameter อัจฉริยะ (Full Auto Mode)</p>
  </div>

  <div class="container">
    <div class="input-panel">
      <h3>⚙️ ข้อมูลเงินทุนความเสี่ยง</h3>
      
      <div class="input-group">
        <label>1. เงินทุนปัจจุบัน (Equity - USD)</label>
        <input type="number" id="equity" value="500">
      </div>
      
      <div class="input-group">
        <label>2. ยอมรับความเสี่ยงได้กี่เปอร์เซ็นต์ (%)</label>
        <input type="number" id="risk-pct" value="10" step="0.5">
      </div>
      
      <div class="input-group">
        <label style="color: #ff9800;">3. ตั้งค่าระยะ Stop Loss (ไม่บังคับ)</label>
        <span class="label-desc" style="color: #cc7a00;">ปล่อยว่าง = ให้ระบบหาระยะที่เหมาะสมที่สุดให้</span>
        <input type="number" id="custom-sl" class="input-optional" placeholder="ตัวอย่าง: 600" step="100">
      </div>

      <div class="input-group">
        <label style="color: #ff9800;">4. ล็อก Lot ครั้งแรก (ไม่บังคับ)</label>
        <span class="label-desc" style="color: #cc7a00;">ปล่อยว่าง = ให้ระบบคำนวณ Lot ออโต้ที่ปลอดภัยที่สุดให้</span>
        <input type="number" id="custom-lot" class="input-optional" placeholder="ตัวอย่าง: 0.05" step="0.01">
      </div>
